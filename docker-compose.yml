  # ── Agent Dashboard (web UI for monitoring + controls) ──
  owlet-dashboard:
    <<: *bot-common
    container_name: owlet-dashboard
    command: ["python", "-m", "options_owl.dashboard.app"]
    ports:
      - "0.0.0.0:8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://owl:${POSTGRES_PASSWORD:-owl_dev_2026}@postgres:5432/options_owl
      - REDIS_URL=redis://redis:6379/0
      - DASHBOARD_SECRET_KEY=${DASHBOARD_SECRET_KEY:-change-me-in-production}
      - DASHBOARD_DEFAULT_PASSWORD=${DASHBOARD_DEFAULT_PASSWORD:-changeme123}
      - DASHBOARD_PORT=8443
    volumes:
      - ./journal:/app/journal:ro
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8443/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Centralized data harvester — single source of truth for all market data.
  # Captures: Polygon options chain snapshots, stock candles (/stocks WS),
  # institutional option flow (/options WS), and streams to all bots via Redis.
  # All trading bots have ENABLE_POLYGON_WS=false — they read from Redis/PG.
  owlet-harvester:
    <<: *bot-common
    container_name: owlet-harvester
    command: ["python", "-m", "options_owl.harvester"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      # + new UW-flow CALL tickers (ORCL,INTC,ARM,GOOG,LRCX) so agents get real-time Redis price/
      # candle/premium streams for them (else they fall back to Polygon REST). GOOG ≠ GOOGL.
      - HARVEST_UNIVERSE=SPY,QQQ,IWM,AAPL,TSLA,NVDA,META,AMD,AMZN,GOOGL,MSFT,MU,MSTR,NFLX,SMCI,PLTR,COIN,BA,JPM,AVGO,XLK,XLF,DIA,GLD,SLV,TLT,VIX,ORCL,INTC,ARM,GOOG,LRCX
      - HARVEST_POLL_INTERVAL=15
      - HARVEST_MAX_DTE=7
      - HARVEST_STRIKE_WINDOW=5
      - HARVEST_MARKET_HOURS_ONLY=true
      # PostgreSQL for tick data capture (stock prices, option snapshots, flow)
      - ENABLE_POSTGRES=true
      - DATABASE_URL=postgresql://owl:${POSTGRES_PASSWORD:-owl_dev_2026}@postgres:5432/options_owl
      # Redis for real-time streaming to all trading bots
      - ENABLE_REDIS=true
      - REDIS_URL=redis://redis:6379/0
      # Centralized flow capture — uses Kody's key for /options WS.
      # All bots have ENABLE_POLYGON_WS=false so this key's slot is free.
      - FLOW_POLYGON_API_KEY=${POLYGON_API_KEY}
    volumes:
      - ./journal/owlet-harvester:/app/journal

  # SHADOW MODE: logs whale ask-side put-sweep signals (META/AMZN/AAPL/TSLA), does NOT
  # trade. Phase 6 of down-day-capture — validate live signals vs backtest before wiring
  # into the entry pipeline. Needs UNUSUAL_WHALES_API_KEY in .env (env_file).
  owlet-flow-shadow:
    <<: *bot-common
    container_name: owlet-flow-shadow
    command: ["python", "scripts/uw_flow_shadow.py"]
    healthcheck:
      disable: true
    volumes:
      - ./journal:/app/journal   # shared journal so uw_flow/uw_flow_alerts.db is queryable alongside other data

  # Forward-collects darkpool prints (UW has no history) → journal/darkpool/darkpool.db, for B3
  # (darkpool S/R) research. Observe-only, REST poll every 5min market hours; zero trade impact.
  owlet-darkpool-shadow:
    <<: *bot-common
    container_name: owlet-darkpool-shadow
    command: ["python", "scripts/uw_darkpool_shadow.py"]
    healthcheck:
      disable: true
    volumes:
      - ./journal:/app/journal
