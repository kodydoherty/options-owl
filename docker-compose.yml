# docker-compose.yml — run multiple OptionsOwl bots with shared config.
#
# Usage:
#   1. Edit .env with shared strategy/API config
#   2. Set PORTFOLIO_SIZE per bot below (only difference between owlets)
#   3. docker compose up -d
#
# Each bot gets:
#   - Shared .env config (mounted read-only)
#   - PORTFOLIO_SIZE override via environment
#   - Its own journal/ directory (SQLite DB, logs, heartbeat)

x-bot-common: &bot-common
  build: .
  restart: always
  stop_grace_period: 10s
  env_file: .env
  environment:
    - PYTHONUNBUFFERED=1
  healthcheck:
    test: ["CMD", "python", "-c", "import time; from pathlib import Path; hb=Path('journal/heartbeat'); assert hb.exists(), 'no heartbeat'; age=time.time()-int(hb.read_text()); assert age<120, f'stale heartbeat: {age:.0f}s'"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 45s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  deploy:
    resources:
      limits:
        memory: 1G

services:
  # ── Shared Redis (cross-agent coordination) ──
  redis:
    image: redis:7-alpine
    container_name: options-owl-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - ./journal/redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Shared PostgreSQL (sourcing + future bot migration) ──
  postgres:
    image: postgres:16-alpine
    container_name: options-owl-db
    restart: always
    environment:
      POSTGRES_DB: options_owl
      POSTGRES_USER: owl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owl_dev_2026}
    volumes:
      - ./journal/postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owl"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  owlet-kody:
    <<: *bot-common
    container_name: owlet-kody
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PORTFOLIO_SIZE=23000
      - PAPER_TRADE=false
      - WEBULL_KILL_SWITCH=false
      - EXIT_ENGINE=v5
      - MAX_CONCURRENT=8
      - MAX_POSITION_PCT=15
      - MAX_DCA_POSITION_PCT=10
      - MAX_TRADE_LOSS_EXIT_PCT=8
      - MAX_PORTFOLIO_RISK_PCT=75
      - ENABLE_WEBULL_PAPER=true
      - WEBULL_APP_KEY=${KODY_WEBULL_APP_KEY}
      - WEBULL_APP_SECRET=${KODY_WEBULL_APP_SECRET}
      - WEBULL_ACCOUNT_ID=${KODY_WEBULL_ACCOUNT_ID}
      - WEBULL_EMAIL=${KODY_WEBULL_EMAIL}
      - WEBULL_PASSWORD=${KODY_WEBULL_PASSWORD}
      - WEBULL_TRADE_PIN=${KODY_WEBULL_TRADE_PIN}
      - WEBULL_DID=${KODY_WEBULL_DID}
      # Signal source: sourcing pipeline only (no Discord signals)
      - ENABLE_DISCORD_SIGNALS=false
      # V6 enhancements
      - ENABLE_V6_PER_TICKER_CONFIG=true
      # V7 Phase A (CALL wide-trail exits) — kody only, staged rollout 2026-06-12.
      # Exit-only ablation: both OOS windows beat V6 exits at identical win rate
      # (OOS +72% / OOS2 +27% P&L, higher PF). PUTs unchanged.
      - ENABLE_V7_WIDE_TRAIL=true
      # V7 gate-volume fix (multi-value sweep 2026-06-13, 3 OOS windows): pattern 0.74→0.62
      # at entry 0.80. ~1.8× volume (1.7→3.1 trades/day), PF holds ~3.8, DD 6.5→10.
      - ML_PATTERN_THRESHOLD=0.62
      # UW whale-flow signals on all bots 2026-06-13 (live on kody/dennis, paper on adam/vinny/yank).
      - ENABLE_UW_FLOW_SIGNAL=true
      # Selective OTM flow strike (validated combos: AMD/INTC/META/SPY calls, TSLA puts) — 2026-06-15.
      - ENABLE_FLOW_OTM_STRIKE=true
      # Anti-martingale ADD: buy more on a confirmed runner (CALL +30 / PUT +30&+100 pyramid) — 2026-06-15.
      - ENABLE_ANTIMARTINGALE_ADD=true
      # B2 market-tide gate: down-size puts entered against the market-wide whale tide (puts-only) — 2026-06-15.
      - ENABLE_V7_TIDE_GATE=true
      # Stage D conviction sizing — kody LIVE 2026-06-14 (validated +72% / combined PF 1.78; vinny paper canary).
      - ENABLE_V7_CONVICTION_SIZING=true
      - ENABLE_V6_BREAKEVEN_RATCHET=true
      - ENABLE_V6_2PM_TIGHTEN=true
      - ENABLE_V6_PREMIUM_CAP=false
      - ENABLE_OTM_DISTANCE_GATE=false
      - ENABLE_DELTA_GATE=true
      - ENABLE_V6_SPREAD_GATE=true
      - ENABLE_V6_SCALEOUT=true
      - ENABLE_V6_DCA=true
      - ENABLE_V6_EARLY_POP_GATE=true
      - ENABLE_DIP_CONFIRM=true
      # Polygon WS disabled — Kody's key is used by harvester for centralized flow capture.
      # Premium monitoring uses Polygon REST (accurate, ~1s delay). All agents get
      # real-time flow data from harvester via Redis pub/sub.
      - ENABLE_POLYGON_WS=false
      - AGENT_ID=owlet_kody
      - ENABLE_POSTGRES=true
      - DATABASE_URL=postgresql://owl:${POSTGRES_PASSWORD:-owl_dev_2026}@postgres:5432/options_owl
      - ENABLE_REDIS=true
      - REDIS_URL=redis://redis:6379/0

    volumes:
      - ./journal/owlet-kody:/app/journal
      - ./journal/models:/app/journal/models:ro

