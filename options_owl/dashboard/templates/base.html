<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OptionsOwl{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        owl: {
                            bg: '#0f1117',
                            card: '#1a1d29',
                            border: '#2a2d3a',
                            accent: '#6366f1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f1117; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-owl-bg text-gray-200 min-h-screen">
    {% block nav %}
    {% if user is defined and user %}
    <nav class="bg-owl-card border-b border-owl-border px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="text-xl font-bold text-white">OptionsOwl</a>
            <span class="text-sm text-gray-400">{{ user.sub }} / {{ user.agent_id }}</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="ws-status" class="w-2 h-2 rounded-full bg-gray-500" title="WebSocket disconnected"></span>
            <a href="/analytics" class="text-sm text-gray-400 hover:text-white">Analytics</a>
            <a href="/settings" class="text-sm text-gray-400 hover:text-white">Settings</a>
            <a href="/logout" class="text-sm text-gray-400 hover:text-white">Logout</a>
        </div>
    </nav>
    {% endif %}
    {% endblock %}

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
