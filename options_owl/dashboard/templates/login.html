{% extends "base.html" %}
{% block title %}Login — OptionsOwl{% endblock %}
{% block nav %}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-owl-card border border-owl-border rounded-xl p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-white mb-1">OptionsOwl</h1>
        <p class="text-gray-400 text-sm mb-6">Agent Dashboard</p>

        {% if error %}
        <div class="bg-red-900/30 border border-red-700 text-red-300 rounded-lg px-4 py-2 mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1" for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                    class="w-full bg-owl-bg border border-owl-border rounded-lg px-3 py-2 text-white focus:border-owl-accent focus:outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-400 mb-1" for="password">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-owl-bg border border-owl-border rounded-lg px-3 py-2 text-white focus:border-owl-accent focus:outline-none">
            </div>
            <button type="submit"
                class="w-full bg-owl-accent hover:bg-indigo-600 text-white font-medium py-2 px-4 rounded-lg transition">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
